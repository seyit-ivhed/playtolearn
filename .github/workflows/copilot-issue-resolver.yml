name: Copilot Issue Resolver

on:
  issues:
    types: [assigned]

jobs:
  trigger-copilot:
    # Only run when the issue is assigned to the Copilot bot
    if: contains(github.event.assignee.login, 'opilot')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Post Copilot trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `@copilot Please resolve this issue following the **issue-resolver** skill (\`.agent/skills/issue-resolver/SKILL.md\`). When done, create a pull request and add the label \`copilot-review-requested\` to the issue`
            });
