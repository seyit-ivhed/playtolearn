name: Copilot Review Label Trigger

on:
  pull_request:
    types: [labeled]

jobs:
  trigger-copilot-review:
    if: github.event.label.name == 'copilot-review-requested'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Remove label and post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Remove the label immediately to prevent re-triggering
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              name: 'copilot-review-requested'
            });

            // Post the review comment to trigger the Copilot reviewer
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `@copilot Please put on your **reviewer hat** and do an independent code review of this pull request following the **code-reviewer** skill (\`.agent/skills/code-reviewer/SKILL.md\`). Review it as if you have no knowledge of the original implementation — focus on correctness, quality, test coverage, and adherence to the standards in \`/docs/developer-expectations.md\`. Apply all improvements directly. When done, mark the PR as ready for review and assign it to @seyit-ivhed.`
            });
