name: Deploy to production

on:
  push:
    branches: [production]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Run migrations and deploy to production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run database migrations on production
        run: |
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")
          supabase db push --db-url "postgresql://postgres:${ENCODED_PASSWORD}@db.${{ secrets.PROD_PROJECT_REF }}.supabase.co:5432/postgres"
        env:
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

      - name: Deploy edge functions to production
        run: supabase functions deploy --project-ref ${{ secrets.PROD_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Vercel deploys the frontend automatically via its GitHub integration.
      # No additional step is needed here.
