name: Deploy to staging

on:
  push:
    branches: [main]

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Run migrations and deploy to staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge function tests
        run: deno test --allow-env --allow-net --allow-read supabase/functions/

      - name: Install Playwright browsers
        run: npm run playwright:install

      - name: E2E tests
        run: npm run test:e2e

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create empty signing key for CLI
        run: echo '[]' > supabase/signing_key.json

      - name: Run database migrations on staging
        run: |
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")
          supabase db push --db-url "postgresql://postgres:${ENCODED_PASSWORD}@db.${{ secrets.STAGING_PROJECT_REF }}.supabase.co:5432/postgres"
        env:
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

      - name: Deploy edge functions to staging
        run: supabase functions deploy --project-ref ${{ secrets.STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Vercel deploys the frontend automatically via its GitHub integration.
      # No additional step is needed here.
